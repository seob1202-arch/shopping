<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Global Picks</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    
    <style>
        /* 기본 폰트 설정 */
        body { 
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #F1F5F9; /* Slate-100: 더 차분한 배경 */
            color: #334155; /* Slate-700 */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 스크롤바 숨김 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 헤더 글래스 효과 */
        .glass-header { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        
        /* FAB 버튼 애니메이션 */
        .fab { 
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4); 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fab:active { transform: scale(0.9); }
        .fab:hover { transform: translateY(-4px); }

        /* 모달 애니메이션 */
        .modal-overlay { opacity: 0; pointer-events: none; transition: all 0.3s ease-out; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 92vh; border-radius: 24px 24px 0 0; }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        
        .popup-card { transform: scale(0.9) translateY(20px); opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .popup-card { transform: scale(1) translateY(0); opacity: 1; }

        @media (min-width: 640px) {
            .bottom-sheet { transform: scale(0.95); opacity: 0; border-radius: 24px; max-height: 85vh; width: 100%; max-width: 480px; margin: auto; }
            .modal-overlay.active .bottom-sheet { transform: scale(1); opacity: 1; }
        }
        
        /* 이미지 슬라이더 */
        .slider-scroll { scroll-snap-type: x mandatory; }
        .slider-item { scroll-snap-align: center; }
        
        /* 배너 쉬머 효과 */
        @keyframes shine { 
            0% { transform: translateX(-100%) skewX(-15deg); } 
            100% { transform: translateX(200%) skewX(-15deg); } 
        }
        .shine-effect::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%; 
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); 
            transform: translateX(-100%); 
            animation: shine 4s infinite ease-in-out; 
        }
    </style>
</head>
<body>

    <header class="glass-header fixed top-0 w-full z-40 transition-all duration-300">
        <div class="max-w-xl mx-auto px-5 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-900">
                    Global<span class="text-indigo-600">Picks</span>
                </h1>
            </div>
            <div class="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:bg-slate-200 transition-colors cursor-pointer">
                <i class="fas fa-user text-sm"></i>
            </div>
        </div>
        <div class="max-w-xl mx-auto px-4 pb-3 overflow-x-auto hide-scrollbar flex gap-2">
            <button class="filter-btn active whitespace-nowrap px-4 py-2 rounded-full bg-slate-900 text-white text-xs font-bold shadow-lg shadow-slate-200 transition-all transform active:scale-95" onclick="filterItems('country', '')">🌍 전체</button>
            <div id="countryFilterContainer" class="flex gap-2"></div>
        </div>
    </header>

    <main class="max-w-xl mx-auto pt-36 pb-32 px-4">
        
        <div class="mb-8 bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 rounded-3xl p-6 text-white shadow-xl shadow-indigo-200/50 relative overflow-hidden shine-effect">
            <div class="relative z-10">
                <p class="text-[10px] font-bold text-indigo-100 mb-2 tracking-widest uppercase bg-white/20 inline-block px-2 py-1 rounded-md backdrop-blur-sm">Community</p>
                <h2 class="font-bold text-xl mb-2 leading-snug tracking-tight">"다들 해외에서 뭐 사요?" 🛒</h2>
                <p class="text-sm text-indigo-50 font-medium leading-relaxed opacity-90">전 세계 한국인의 검증된<br>현지 찐꿀템을 만나보세요.</p>
            </div>
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            <div class="absolute top-10 right-10 w-16 h-16 bg-yellow-300/20 rounded-full blur-xl"></div>
        </div>
        
        <div class="flex gap-3 mb-6 sticky top-[135px] z-30 py-2 -mx-4 px-4 backdrop-blur-sm bg-slate-100/50">
            <div class="relative flex-1 group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm group-focus-within:text-indigo-500 transition-colors"></i>
                <input type="text" id="searchInput" placeholder="아이템 검색..." class="w-full bg-white border border-slate-200 rounded-2xl pl-10 pr-4 py-3.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 shadow-sm transition-all">
            </div>
            <div class="relative w-[35%] min-w-[120px]">
                <select id="headerTagFilter" onchange="filterItems('tag', this.value)" class="w-full h-full bg-white border border-slate-200 text-slate-600 text-xs font-bold rounded-2xl px-3 pl-3 appearance-none focus:outline-none focus:ring-2 focus:ring-indigo-500/50 shadow-sm transition-all cursor-pointer">
                    <option value="">🏷️ 태그 전체</option>
                    <option value="현지필수템">🔥 현지필수템</option>
                    <option value="가성비갑">💰 가성비갑</option>
                    <option value="선물강추">🎁 선물강추</option>
                    <option value="희귀템">💎 희귀템</option>
                    <option value="세일정보">📉 세일정보</option>
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none"></i>
            </div>
        </div>

        <div id="itemList" class="grid grid-cols-2 gap-x-4 gap-y-6">
            <div class="animate-pulse bg-white p-2 rounded-2xl shadow-sm"><div class="bg-slate-200 aspect-[4/5] rounded-xl mb-3"></div><div class="h-4 bg-slate-200 rounded w-3/4 mb-2"></div><div class="h-4 bg-slate-200 rounded w-1/2"></div></div>
            <div class="animate-pulse bg-white p-2 rounded-2xl shadow-sm"><div class="bg-slate-200 aspect-[4/5] rounded-xl mb-3"></div><div class="h-4 bg-slate-200 rounded w-3/4 mb-2"></div><div class="h-4 bg-slate-200 rounded w-1/2"></div></div>
        </div>
    </main>

    <div class="fixed bottom-8 right-6 z-30">
        <button onclick="openRegisterModal()" class="fab w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xl hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300"><i class="fas fa-plus"></i></button>
    </div>

    <div id="registerModal" class="modal-overlay fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="bottom-sheet bg-white w-full flex flex-col overflow-hidden shadow-2xl">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 class="text-lg font-bold text-slate-900 tracking-tight" id="modalTitle">새로운 꿀템 등록</h2>
                <button onclick="closeModal('registerModal')" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 hover:bg-slate-100 hover:text-slate-600 flex items-center justify-center transition-colors"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="itemForm" class="p-6 overflow-y-auto space-y-6 flex-1 bg-white">
                <input type="hidden" name="id" id="editId">
                <input type="hidden" name="action" id="formAction" value="create">

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Images (Max 3)</label>
                    <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
                        <label class="flex-shrink-0 w-20 h-20 border-2 border-dashed border-indigo-200 bg-indigo-50/50 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition-all group">
                            <i class="fas fa-camera text-indigo-300 group-hover:text-indigo-500 text-lg mb-1 transition-colors"></i>
                            <span class="text-[10px] text-indigo-400 font-bold" id="imgCount">0/3</span>
                            <input type="file" id="fileInput" accept="image/*" class="hidden" multiple onchange="handleFileSelect(this)">
                        </label>
                        <div id="imagePreviewContainer" class="flex gap-3"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">상품명</label>
                        <input type="text" name="name" id="inputName" required class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-sm font-medium focus:ring-2 focus:ring-indigo-500 transition-all placeholder-slate-400" placeholder="예: 트레이더조 에코백">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">국가</label>
                            <div class="relative">
                                <select name="countrySelect" id="countrySelect" onchange="handleCountryChange(this)" class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-sm font-medium appearance-none focus:ring-2 focus:ring-indigo-500"></select>
                                <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none"></i>
                            </div>
                            <input type="text" name="customCountry" id="customCountryInput" placeholder="직접 입력" class="hidden w-full mt-2 bg-slate-50 border-0 rounded-2xl p-4 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">태그</label>
                            <div class="relative">
                                <select name="tag" id="inputTag" class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-sm font-medium appearance-none focus:ring-2 focus:ring-indigo-500">
                                    <option value="현지필수템">🔥 현지필수템</option>
                                    <option value="가성비갑">💰 가성비갑</option>
                                    <option value="선물강추">🎁 선물강추</option>
                                    <option value="희귀템">💎 희귀템</option>
                                    <option value="세일정보">📉 세일정보</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">가격</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <span id="currencySymbol" class="text-indigo-600 font-bold text-sm">$</span>
                                </div>
                                <input type="number" step="0.01" name="priceRaw" id="priceRaw" placeholder="0.00" class="w-full bg-slate-50 border-0 rounded-2xl pl-8 p-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">게시 종료일</label>
                            <input type="date" name="endDate" id="inputEndDate" required class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-sm font-medium focus:ring-2 focus:ring-indigo-500 text-slate-600">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">상세 설명</label>
                        <textarea name="desc" id="inputDesc" rows="4" required class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-sm leading-relaxed focus:ring-2 focus:ring-indigo-500 resize-none placeholder-slate-400" placeholder="이 제품의 장점이나 구매 팁을 공유해주세요."></textarea>
                    </div>

                    <div class="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                        <label class="block text-xs font-bold text-indigo-900 mb-1.5 ml-1">구매 링크</label>
                        <input type="url" name="link" id="inputLink" placeholder="https://" class="w-full bg-white border border-indigo-100 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 mb-2">
                        <label class="flex items-center space-x-2 cursor-pointer group select-none">
                            <input type="checkbox" id="isAffiliateInput" class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 transition">
                            <span class="text-xs text-indigo-800 font-medium group-hover:text-indigo-600">🎁 제휴(수익성) 링크 포함</span>
                        </label>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">비밀번호 (4자리)</label>
                        <input type="password" name="password" required maxlength="4" placeholder="수정/삭제용 숫자" class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-sm tracking-widest focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-slate-200 hover:bg-black hover:shadow-xl active:scale-[0.98] transition-all duration-300" id="submitBtn">
                    등록 완료
                </button>
                <div class="h-6"></div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="bottom-sheet bg-white w-full flex flex-col overflow-hidden shadow-2xl h-[90vh] sm:h-[85vh]">
            <div id="detailContent" class="flex-1 overflow-y-auto relative bg-white scrollbar-hide"></div>
            
            <div class="bg-white border-t border-slate-100 safe-area-bottom">
                <div id="detailActions" class="px-6 py-2 flex justify-end gap-3 text-xs font-bold text-slate-400"></div>
                <div class="p-4 flex gap-3">
                    <button onclick="closeModal('detailModal')" class="flex-1 py-4 rounded-2xl border border-slate-200 text-slate-700 font-bold hover:bg-slate-50 transition active:scale-95">닫기</button>
                    <a id="detailLinkBtn" href="#" target="_blank" class="flex-[2] py-4 rounded-2xl bg-indigo-600 text-white font-bold flex items-center justify-center gap-2 shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition active:scale-95">
                        <span>구매하러 가기</span> <i class="fas fa-arrow-right text-xs"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal-overlay fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
        <div class="popup-card bg-white rounded-3xl p-8 w-[80%] max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5 animate-bounce">
                <i class="fas fa-check text-2xl text-green-600"></i>
            </div>
            <h3 class="text-xl font-extrabold text-slate-900 mb-2" id="successTitle">완료</h3>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed font-medium" id="successMsg">처리가 완료되었습니다.</p>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all">확인</button>
        </div>
    </div>
    
    <div id="passwordModal" class="modal-overlay fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
        <div class="popup-card bg-white rounded-3xl p-8 w-[80%] max-w-sm shadow-2xl">
            <h3 class="text-lg font-bold text-slate-900 mb-4 text-center">비밀번호 확인</h3>
            <input type="password" id="deletePasswordInput" placeholder="●●●●" class="w-full bg-slate-50 border-0 rounded-2xl p-4 text-lg font-bold text-center tracking-widest focus:ring-2 focus:ring-indigo-500 mb-6 text-slate-900">
            <div class="flex gap-3">
                <button onclick="closeModal('passwordModal')" class="flex-1 py-3 rounded-2xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50">취소</button>
                <button onclick="confirmDelete()" class="flex-1 py-3 rounded-2xl bg-red-500 text-white font-bold hover:bg-red-600 shadow-lg shadow-red-200">삭제</button>
            </div>
        </div>
    </div>

    <script>
        // ▼▼▼ 백엔드 URL 유지 ▼▼▼
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEw2ilsYVihux-yYo3H0ZhsxBTwBAY9_XWpDVIMkyGeDe-NgGhqmTZhUz1-UWFmKCOCA/exec'; 

        const currencyMap = { "미국": "$", "일본": "¥", "중국": "¥", "베트남": "₫", "태국": "฿", "필리핀": "₱", "유럽": "€", "영국": "£", "호주": "A$", "캐나다": "C$", "대만": "NT$", "싱가포르": "S$", "말레이시아": "RM", "인도네시아": "Rp", "한국": "₩", "기타": "$" };
        const countries = Object.keys(currencyMap).filter(k => k !== "기타"); countries.push("기타");
        
        // 태그별 컬러 매핑 (파스텔톤 배경 + 진한 텍스트)
        const tagStyles = {
            '현지필수템': 'bg-rose-100 text-rose-600',
            '가성비갑': 'bg-blue-100 text-blue-600',
            '선물강추': 'bg-amber-100 text-amber-600',
            '희귀템': 'bg-purple-100 text-purple-600',
            '세일정보': 'bg-emerald-100 text-emerald-600'
        };

        let allData = [];
        let uploadFiles = [];
        let currentFilter = { country: '', tag: '', search: '' };
        let deleteTargetId = null; 

        document.addEventListener('DOMContentLoaded', () => {
            initCountryFilter(); initFormSelect(); loadItems();
            document.getElementById('searchInput').addEventListener('input', (e) => filterItems('search', e.target.value));
        });

        // UI Helpers
        function getTagClass(tag) { return tagStyles[tag] || 'bg-slate-100 text-slate-500'; }

        // --- 필터링 ---
        function filterItems(type, value) {
            if (type === 'country') {
                currentFilter.country = value;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    const isActive = (value === '' && btn.innerText.includes('전체')) || btn.innerText === value;
                    btn.className = isActive 
                        ? 'filter-btn active whitespace-nowrap px-4 py-2 rounded-full bg-slate-900 text-white text-xs font-bold shadow-lg shadow-slate-300 transition-all transform scale-105'
                        : 'filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-500 border border-slate-200 text-xs font-bold shadow-sm transition-all active:scale-95 hover:bg-slate-50';
                });
            } else if (type === 'tag') currentFilter.tag = value;
            else if (type === 'search') currentFilter.search = value.toLowerCase();

            const filtered = allData.filter(item => {
                const matchCountry = !currentFilter.country || item.country === currentFilter.country;
                const matchTag = !currentFilter.tag || item.tag === currentFilter.tag;
                const matchSearch = !currentFilter.search || item.name.toLowerCase().includes(currentFilter.search) || item.desc.toLowerCase().includes(currentFilter.search);
                return matchCountry && matchTag && matchSearch;
            });
            renderItems(filtered);
        }

        // --- 렌더링 (리스트 UI 핵심) ---
        function renderItems(items) {
            const container = document.getElementById('itemList');
            container.innerHTML = '';
            
            if (items.length === 0) { 
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-24 text-slate-300">
                        <i class="fas fa-search text-4xl mb-4 opacity-50"></i>
                        <span class="text-sm font-medium">검색 결과가 없습니다.</span>
                    </div>`; 
                return; 
            }

            items.forEach(item => {
                const tagClass = getTagClass(item.tag);
                // 이미지 처리 (썸네일)
                const thumb = (item.imageUrls && item.imageUrls.length > 0) ? item.imageUrls[0] : null;
                
                // 이미지가 없을 때 보여줄 대체 UI (No Image 개선)
                const imgHtml = thumb 
                    ? `<img src="${thumb}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\\'w-full h-full bg-slate-50 flex flex-col items-center justify-center text-slate-300\\'><i class=\\'fas fa-image text-3xl mb-1\\'></i><span class=\\'text-[10px] font-bold\\'>No Image</span></div>';">` 
                    : `<div class="w-full h-full bg-slate-50 flex flex-col items-center justify-center text-slate-300">
                        <i class="fas fa-camera text-2xl mb-1 opacity-50"></i>
                       </div>`;
                
                const affiliateIcon = item.isAffiliate ? '<span class="bg-amber-50 text-amber-600 text-[10px] px-1.5 py-0.5 rounded-md font-bold border border-amber-100 flex items-center gap-1"><i class="fas fa-gift text-[9px]"></i> 제휴</span>' : '';
                const imageCountBadge = (item.imageUrls && item.imageUrls.length > 1) 
                    ? `<div class="absolute top-2 right-2 bg-black/40 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1"><i class="far fa-images"></i> ${item.imageUrls.length}</div>` 
                    : '';

                const html = `
                <div class="group bg-white rounded-3xl p-2.5 shadow-sm border border-slate-100 cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all duration-300" onclick='openDetail(${JSON.stringify(item)})'>
                    <div class="aspect-[4/5] relative overflow-hidden rounded-2xl bg-slate-100 isolate">
                        ${imgHtml}
                        <div class="absolute top-2 left-2 bg-white/90 backdrop-blur-md text-slate-800 text-[10px] font-extrabold px-2.5 py-1 rounded-full shadow-sm z-10 border border-white/50">
                            ${item.country}
                        </div>
                        ${imageCountBadge}
                    </div>
                    
                    <div class="pt-3 px-1 pb-1">
                        <div class="flex items-start justify-between mb-1.5">
                            <span class="${tagClass} text-[10px] font-bold px-2 py-0.5 rounded-md tracking-tight">${item.tag}</span>
                        </div>
                        <h3 class="font-bold text-sm text-slate-800 line-clamp-2 leading-snug mb-2 min-h-[2.5em] group-hover:text-indigo-600 transition-colors">
                            ${item.name}
                        </h3>
                        <div class="flex items-center justify-between mt-auto">
                            <span class="font-extrabold text-base text-slate-900 tracking-tight">${item.price}</span>
                            ${affiliateIcon}
                        </div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // --- 상세 모달 ---
        function openDetail(item) {
            const content = document.getElementById('detailContent');
            const linkBtn = document.getElementById('detailLinkBtn');
            const actionsDiv = document.getElementById('detailActions');
            const tagClass = getTagClass(item.tag);

            // 이미지 슬라이더
            let sliderHtml = '', indicatorHtml = '';
            if (item.imageUrls && item.imageUrls.length > 0) {
                sliderHtml = item.imageUrls.map(url => `
                    <div class="slider-item w-full flex-shrink-0 relative aspect-square sm:aspect-[4/3] bg-slate-50 flex items-center justify-center overflow-hidden">
                        <img src="${url}" class="w-full h-full object-contain backdrop-blur-3xl" onerror="this.src='https://placehold.co/600x400/f1f5f9/94a3b8?text=Image+Error';">
                        <div class="absolute inset-0 z-[-1] bg-cover bg-center opacity-30 blur-2xl scale-110" style="background-image: url('${url}')"></div>
                    </div>`).join('');
                
                if (item.imageUrls.length > 1) { 
                    indicatorHtml = `<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 p-1.5 bg-black/20 backdrop-blur-md rounded-full">
                        ${item.imageUrls.map(() => `<div class="w-1.5 h-1.5 rounded-full bg-white/90 shadow-sm"></div>`).join('')}
                    </div>`; 
                }
            } else { 
                sliderHtml = `<div class="w-full aspect-square bg-slate-50 flex flex-col items-center justify-center text-slate-300">
                    <i class="fas fa-camera text-4xl mb-2 opacity-50"></i>
                    <span class="text-xs font-bold">No Image</span>
                </div>`; 
            }

            const affiliateAlert = item.isAffiliate ? `
                <div class="bg-amber-50 border border-amber-100 rounded-xl p-3 mb-5 flex items-start gap-3">
                    <div class="bg-amber-100 text-amber-600 w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"><i class="fas fa-gift text-xs"></i></div>
                    <div class="text-xs text-amber-800 leading-relaxed font-medium">
                        <span class="font-bold text-amber-900 block mb-0.5">제휴 링크 안내</span>
                        이 링크를 통해 구매하시면 작성자에게 소정의 수익이 발생할 수 있습니다.
                    </div>
                </div>` : '';

            content.innerHTML = `
                <div class="relative w-full overflow-x-auto slider-scroll flex bg-slate-100 snap-x snap-mandatory">
                    ${sliderHtml}${indicatorHtml}
                    <button onclick="closeModal('detailModal')" class="absolute top-4 right-4 z-20 w-9 h-9 bg-white/80 text-slate-900 rounded-full flex items-center justify-center backdrop-blur-md shadow-sm border border-white/50"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="p-6 relative -top-4 bg-white rounded-t-3xl">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-[10px] font-extrabold text-slate-600 bg-slate-100 px-2.5 py-1 rounded-full border border-slate-200">${item.country}</span>
                        <span class="${tagClass} text-[10px] font-bold px-2.5 py-1 rounded-full">${item.tag}</span>
                    </div>
                    
                    <h2 class="text-2xl font-extrabold text-slate-900 leading-tight mb-2 tracking-tight">${item.name}</h2>
                    <div class="text-2xl font-bold text-indigo-600 mb-6 tracking-tight">${item.price}</div>
                    
                    ${affiliateAlert}
                    
                    <div class="prose prose-sm prose-slate max-w-none">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Description</h4>
                            <p class="text-sm text-slate-700 leading-7 whitespace-pre-wrap font-medium">${item.desc}</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex items-center justify-between text-xs font-bold text-slate-400 px-2">
                        <span><i class="far fa-clock mr-1"></i> 마감: ${item.endDate}</span>
                    </div>
                </div>`;

            // 링크 처리
            if (item.link) { 
                linkBtn.href = item.link; 
                linkBtn.classList.remove('opacity-50', 'pointer-events-none', 'bg-slate-300');
                linkBtn.classList.add('bg-indigo-600', 'shadow-indigo-200');
                linkBtn.innerHTML = `<span>구매하러 가기</span> <i class="fas fa-external-link-alt text-xs"></i>`; 
            } else { 
                linkBtn.href = '#'; 
                linkBtn.classList.add('opacity-50', 'pointer-events-none', 'bg-slate-300');
                linkBtn.classList.remove('bg-indigo-600', 'shadow-indigo-200');
                linkBtn.innerHTML = `<span>링크 없음</span>`; 
            }

            const safeItem = encodeURIComponent(JSON.stringify(item));
            actionsDiv.innerHTML = `
                <button onclick="requestEdit('${safeItem}')" class="hover:text-indigo-600 flex items-center gap-1 transition-colors p-2"><i class="far fa-edit"></i> 수정</button>
                <div class="w-px h-3 bg-slate-200 my-auto"></div>
                <button onclick="openDeleteModal('${item.id}')" class="hover:text-red-500 flex items-center gap-1 transition-colors p-2"><i class="far fa-trash-alt"></i> 삭제</button>
            `;
            openModal('detailModal');
        }

        // --- 기타 기능 (등록/삭제/수정) ---
        function openDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('deletePasswordInput').value = '';
            openModal('passwordModal');
        }

        function confirmDelete() {
            const password = document.getElementById('deletePasswordInput').value;
            if (!password) return alert('비밀번호를 입력해주세요.');
            closeModal('passwordModal');
            
            fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: deleteTargetId, password: password }) })
            .then(res => res.json())
            .then(data => {
                if(data.result === 'success') showSuccessModal("삭제 완료", "게시물이 삭제되었습니다.");
                else alert("삭제 실패: " + data.error);
            })
            .catch(() => alert("서버 통신 오류"));
        }

        function requestEdit(encodedItem) {
            const item = JSON.parse(decodeURIComponent(encodedItem));
            closeModal('detailModal');
            document.getElementById('modalTitle').innerText = "게시물 수정";
            document.getElementById('formAction').value = "edit";
            document.getElementById('editId').value = item.id;
            document.getElementById('inputName').value = item.name;
            
            const countrySelect = document.getElementById('countrySelect');
            if ([...countrySelect.options].map(o => o.value).includes(item.country)) {
                countrySelect.value = item.country;
            } else {
                countrySelect.value = 'direct';
                document.getElementById('customCountryInput').value = item.country;
            }
            handleCountryChange(countrySelect);

            document.getElementById('inputTag').value = item.tag;
            document.getElementById('priceRaw').value = item.price.replace(/[^0-9.]/g, '');
            document.getElementById('inputEndDate').value = item.endDate;
            document.getElementById('inputDesc').value = item.desc;
            document.getElementById('inputLink').value = item.link;
            document.getElementById('isAffiliateInput').checked = item.isAffiliate;
            document.getElementById('submitBtn').innerText = "수정 완료";
            
            uploadFiles = []; 
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('imgCount').innerText = '0/3';
            openModal('registerModal');
        }

        function openRegisterModal() {
            document.getElementById('itemForm').reset();
            document.getElementById('modalTitle').innerText = "새로운 꿀템 등록";
            document.getElementById('formAction').value = "create";
            document.getElementById('submitBtn').innerText = "등록 완료";
            uploadFiles = [];
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('imgCount').innerText = '0/3';
            handleCountryChange(document.getElementById('countrySelect'));
            openModal('registerModal');
        }

        document.getElementById('itemForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText; btn.disabled = true; btn.innerText = '저장 중...';

            const formData = new FormData(this);
            const symbol = document.getElementById('currencySymbol').innerText;
            const priceVal = document.getElementById('priceRaw').value;

            const payload = {
                action: document.getElementById('formAction').value,
                id: document.getElementById('editId').value,
                name: formData.get('name'),
                country: formData.get('countrySelect') === 'direct' ? formData.get('customCountry') : formData.get('countrySelect'),
                category: '기타',
                tag: formData.get('tag'),
                price: priceVal ? (symbol + priceVal) : '',
                desc: formData.get('desc'),
                endDate: formData.get('endDate'),
                link: formData.get('link'),
                isAffiliate: document.getElementById('isAffiliateInput').checked,
                password: formData.get('password'),
                images: uploadFiles
            };

            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const json = await res.json();
                if(json.result === 'success') {
                    closeModal('registerModal');
                    const msg = payload.action === 'edit' ? "수정되었습니다." : "성공적으로 등록되었습니다.";
                    showSuccessModal("완료", msg);
                } else alert("실패: " + json.error);
            } catch (err) { alert('통신 오류: ' + err.message); } 
            finally { btn.disabled = false; btn.innerText = originalText; }
        });

        // Common Functions
        function showSuccessModal(title, msg) {
            document.getElementById('successTitle').innerText = title;
            document.getElementById('successMsg').innerText = msg;
            openModal('successModal');
        }
        function handleCountryChange(select) {
            const input = document.getElementById('customCountryInput');
            const symbolSpan = document.getElementById('currencySymbol');
            if(select.value === 'direct') { input.classList.remove('hidden'); input.required = true; symbolSpan.innerText = '$'; } 
            else { input.classList.add('hidden'); input.required = false; symbolSpan.innerText = currencyMap[select.value] || '$'; }
        }
        function initCountryFilter() {
            const container = document.getElementById('countryFilterContainer');
            countries.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-500 border border-slate-200 text-xs font-bold shadow-sm transition-all active:scale-95 hover:bg-slate-50';
                btn.innerText = c;
                btn.onclick = (e) => handleFilterClick(e.target, c);
                container.appendChild(btn);
            });
        }
        function handleFilterClick(target, country) {
            document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-500 border border-slate-200 text-xs font-bold shadow-sm transition-all active:scale-95 hover:bg-slate-50');
            if(!target) { document.querySelector('button[onclick="filterItems(\'country\', \'\')"]').className = 'filter-btn active whitespace-nowrap px-4 py-2 rounded-full bg-slate-900 text-white text-xs font-bold shadow-lg shadow-slate-300 transition-all transform scale-105'; filterItems('country', ''); return; }
            target.className = 'filter-btn active whitespace-nowrap px-4 py-2 rounded-full bg-slate-900 text-white text-xs font-bold shadow-lg shadow-slate-300 transition-all transform scale-105';
            filterItems('country', country);
        }
        function initFormSelect() {
            const opts = countries.map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="direct">✏️ 직접 입력</option>';
            document.getElementById('countrySelect').innerHTML = opts;
            handleCountryChange(document.getElementById('countrySelect'));
        }
        function handleFileSelect(input) {
            if (input.files) {
                const remaining = 3 - uploadFiles.length;
                if (remaining <= 0) { alert('사진은 최대 3장까지입니다.'); return; }
                Array.from(input.files).slice(0, remaining).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => { uploadFiles.push({ data: e.target.result, name: file.name }); renderImagePreview(); };
                    reader.readAsDataURL(file);
                });
            } input.value = ''; 
        }
        function renderImagePreview() {
            const container = document.getElementById('imagePreviewContainer');
            document.getElementById('imgCount').innerText = `${uploadFiles.length}/3`;
            container.innerHTML = uploadFiles.map((file, idx) => `
                <div class="relative w-20 h-20 flex-shrink-0 group">
                    <img src="${file.data}" class="w-full h-full object-cover rounded-2xl border border-slate-200 shadow-sm">
                    <button onclick="removeImage(${idx})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-[10px] shadow-md hover:bg-red-600 transition-colors"><i class="fas fa-times"></i></button>
                </div>`).join('');
        }
        function removeImage(idx) { uploadFiles.splice(idx, 1); renderImagePreview(); }
        async function loadItems() {
            try { const res = await fetch(APPS_SCRIPT_URL); const data = await res.json(); allData = data.reverse(); renderItems(allData); } 
            catch (err) { console.error(err); }
        }
        function openModal(id) { const el = document.getElementById(id); el.classList.remove('hidden'); setTimeout(() => el.classList.add('active'), 10); document.body.style.overflow = 'hidden'; }
        function closeModal(id) { const el = document.getElementById(id); el.classList.remove('active'); setTimeout(() => el.classList.add('hidden'), 300); document.body.style.overflow = ''; }
    </script>
</body>
</html>
